server:
  port: 8080

spring:
  application:
    name: moyu-flowsub-backend

qiniu:
  enabled: false
  access-key: ${QINIU_ACCESS_KEY:}
  secret-key: ${QINIU_SECRET_KEY:}
  bucket: ${QINIU_BUCKET:}
  domain: ${QINIU_DOMAIN:}

moyu:
  flowsub:
    mock-enabled: true
    asr:
      mock-enabled: ${ASR_MOCK_ENABLED:true}
      funasr-endpoint: ${FUNASR_ENDPOINT:}
      chunk-duration-ms: ${AUDIO_CHUNK_DURATION_MS:750}
