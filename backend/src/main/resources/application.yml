server:
  port: 8080

spring:
  application:
    name: moyu-flowsub-backend

qiniu:
  enabled: true
  access-key: ${QINIU_ACCESS_KEY:}
  secret-key: ${QINIU_SECRET_KEY:}
  bucket: ${QINIU_BUCKET:}
  domain: ${QINIU_DOMAIN:}
  archive-prefix: ${QINIU_ARCHIVE_PREFIX:moyu-flowsub}
  private-bucket: ${QINIU_PRIVATE_BUCKET:false}
  download-expire-seconds: ${QINIU_DOWNLOAD_EXPIRE_SECONDS:3600}
moyu:
  flowsub:
    asr:
      chunk-duration-ms: ${AUDIO_CHUNK_DURATION_MS:300}

qwen:
  enabled: ${QWEN_ENABLED:false}
  api-key: ${DASHSCOPE_API_KEY:}
  asr-model: ${QWEN_ASR_MODEL:qwen3-asr-flash-realtime}
  translation-model: ${QWEN_TRANSLATION_MODEL:qwen-turbo}
  summary-model: ${QWEN_SUMMARY_MODEL:qwen-plus}
  correction-model: ${QWEN_CORRECTION_MODEL:qwen-plus}
  base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  timeout-ms: ${QWEN_TIMEOUT_MS:12000}
  temperature: ${QWEN_TEMPERATURE:0}
